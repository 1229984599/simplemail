# ============================================================
# PgBouncer 连接池配置
# ============================================================
# 作用：在 Go API 与 PostgreSQL 之间做连接代理和复用，
#       使 API 可以同时打开大量连接，而 PostgreSQL 侧只保持少量真实连接。
#
# ============================================================
# 【端口联动说明】
# ============================================================
# PgBouncer 监听端口默认 6432。
# ⚠️  如果修改 listen_port，必须同步修改：
#   - .env → API_DB_DSN 中的 @pgbouncer:6432 改为新端口
#
# PostgreSQL 端口默认 5432（见第一行 port=5432）。
# ⚠️  如果修改 postgres 容器的 PostgreSQL 端口，必须同步修改：
#   - 本文件第一行的 port=5432 改为新端口
#   （通常不需要修改，PostgreSQL 端口不对外暴露）
#
# ============================================================
# 【数据库名称/用户名联动说明】
# ============================================================
# 第一行的 tempmail（数据库别名）和 dbname=tempmail 来自 .env：
#   POSTGRES_DB  → dbname=XXX
#   POSTGRES_USER → auth_user=XXX（同时也是 admin_users）
# ⚠️  如果修改了 .env 中的 POSTGRES_DB / POSTGRES_USER，
#     需同步修改本文件中对应的 tempmail 字样（共 3 处）。
# ============================================================

[databases]
# 格式：数据库别名 = host=PG主机名 port=PG端口 dbname=实际数据库名 auth_user=用户名
# 主机名 "postgres" 是 Docker Compose 服务名（固定，不要修改）
# ⚠️  port=5432 是 PostgreSQL 容器内端口，如需修改需同步修改 docker-compose.yml
# ⚠️  dbname=tempmail 和 auth_user=tempmail 需与 .env 的 POSTGRES_DB/POSTGRES_USER 一致
tempmail = host=postgres port=5432 dbname=tempmail auth_user=tempmail

[pgbouncer]
# ── 监听配置 ─────────────────────────────────────────────────
listen_addr = 0.0.0.0    # 监听所有网络接口（内网中可用）
listen_port = 6432        # PgBouncer 监听端口
                          # ⚠️  修改后必须同步修改 .env → API_DB_DSN 中的端口

# ── 认证配置 ─────────────────────────────────────────────────
auth_type = scram-sha-256 # 认证方式（与 PostgreSQL 保持一致）
auth_file = /etc/pgbouncer/userlist.txt  # 由 entrypoint.sh 启动时自动生成

# ── 连接池模式 ────────────────────────────────────────────────
# transaction 模式：每个事务分配一个连接，事务结束立即归还
# 这是性能最好的模式，适合 TempMail 这种短事务场景
# 注意：transaction 模式下不能使用 SET/PREPARE 等会话级功能
pool_mode = transaction

# ── 并发限制 ─────────────────────────────────────────────────
max_client_conn = 10000    # 最大客户端连接数（API → PgBouncer 的连接）
                           # 可以设很大，PgBouncer 本身开销很低
default_pool_size = 200    # 每个数据库的连接池大小（PgBouncer → PostgreSQL 的真实连接数）
                           # ⚠️  此值必须 <= PostgreSQL 的 max_connections（docker-compose.yml 设为 500）
                           # 小型部署可改为 20~50，高并发可改为 100~200
min_pool_size = 20         # 预热连接数（始终保持这么多个空闲连接）
reserve_pool_size = 50     # 预留连接数（连接不足时临时借用）
reserve_pool_timeout = 3   # 等待预留连接的超时时间（秒）

# ── 连接生命周期 ──────────────────────────────────────────────
server_lifetime = 3600     # 服务端连接最大存活时间（秒），防止连接变僵尸
server_idle_timeout = 600  # 空闲连接超时（秒），超时后关闭
server_connect_timeout = 5 # 连接 PostgreSQL 的超时（秒）
server_login_retry = 1     # 连接失败后重试次数

# ── 查询超时 ─────────────────────────────────────────────────
query_timeout = 30         # 单条查询最大执行时间（秒），超时则断开连接
query_wait_timeout = 30    # 等待连接池空闲的最大时间（秒）
client_idle_timeout = 300  # 客户端空闲超时（秒）

# ── 日志配置 ─────────────────────────────────────────────────
log_connections = 0        # 关闭连接日志（高并发下会刷屏，生产环境建议关闭）
log_disconnections = 0     # 关闭断开日志
log_pooler_errors = 1      # 保留连接池错误日志（重要，帮助排查问题）
stats_period = 60          # 每 60 秒输出一次统计日志

# ── 管理员 ────────────────────────────────────────────────────
# ⚠️  需与 .env 的 POSTGRES_USER 保持一致
admin_users = tempmail
