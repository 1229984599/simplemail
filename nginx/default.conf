# ============================================================
# Nginx 反向代理配置
# ============================================================
# 职责：
#   1. 提供前端静态文件（HTML/CSS/JS）
#   2. 将 /api/* /public/* /health 请求代理到 Go API 容器
#   3. SPA 路由支持（所有未匹配路径返回 index.html）
#
# ============================================================
# 【端口联动说明】
# ============================================================
# 本文件中 proxy_pass 的目标地址格式为 http://api:端口
# 其中 "api" 是 Docker Compose 服务名（固定，不要修改）
# "端口" 必须与以下配置保持一致：
#   - .env → API_PORT
#   - docker-compose.yml → api.ports 右边的端口
#
# 如果修改了 API 端口（默认 8080），本文件中所有
# "proxy_pass http://api:8080" 都需要同步修改（共 3 处，用搜索替换）
#
# ============================================================
# 【修改前端访问端口】
# ============================================================
# 若要修改 Nginx 监听端口（默认 80）：
#   1. 将下面的 listen 80 改为新端口
#   2. 同步修改 docker-compose.yml → frontend.ports 左边的数字
#   例：listen 8888; → docker-compose.yml 改为 "8888:8888"
#
# ============================================================
# 【配置 HTTPS（SSL）】
# ============================================================
# 需要 HTTPS 时，在此文件末尾或新增 server 块添加：
#   listen 443 ssl;
#   ssl_certificate     /etc/nginx/ssl/cert.pem;
#   ssl_certificate_key /etc/nginx/ssl/key.pem;
# 并在 docker-compose.yml 的 frontend 服务挂载证书目录，
# 同时增加 "443:443" 端口映射。
# ============================================================
server {
    listen 80;
    # ⚠️  如果修改了上面的端口，需同步修改 docker-compose.yml
    #     frontend.ports 左边的数字（格式："宿主机端口:容器端口"）

    server_name _;  # 匹配所有域名；如有自定义域名可改为 server_name yourdomain.com

    root /usr/share/nginx/html;  # 前端文件挂载点（对应 docker-compose.yml 的 volume）
    index index.html;

    # ── 静态资源：强制缓存 7 天（CSS/JS/图片等内容哈希化，安全长期缓存）──
    location ~* \.(css|js|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA 路由：所有未匹配的路径返回 index.html，由前端 JS 处理路由 ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 反向代理 ──────────────────────────────────────────
    # ⚠️  【端口联动】http://api:8080 中的 8080 必须与以下保持一致：
    #   - .env 文件的 API_PORT
    #   - docker-compose.yml 中 api.ports 右边的端口
    # 如果修改 API 端口，下方 3 个 proxy_pass 全部需要同步修改！
    # ──────────────────────────────────────────────────────────
    location /api/ {
        # 代理到 Go API 容器（容器名 api，端口 8080）
        proxy_pass          http://api:8080/api/;   # ← 改端口时修改此处
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  30s;  # 读取响应超时，上传大文件时可适当增大
        proxy_send_timeout  30s;  # 发送请求超时
    }

    location /public/ {
        # 公开接口（注册、统计等），无需认证
        proxy_pass          http://api:8080/public/;  # ← 改端口时修改此处
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  30s;
    }

    location /health {
        # 健康检查接口（供 Docker/LB 探活，返回 {"status":"ok"}）
        proxy_pass          http://api:8080/health;  # ← 改端口时修改此处
        proxy_set_header    Host $host;
    }

    # ── 安全响应头 ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";           # 防止页面被嵌入 iframe（防点击劫持）
    add_header X-Content-Type-Options "nosniff";       # 禁止 MIME 嗅探
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip 压缩（减少传输体积）────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;  # 小于 1KB 的响应不压缩（压缩反而增大）
}
