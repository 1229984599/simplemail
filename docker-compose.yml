# ============================================================
# TempMail - Docker Compose 编排文件
# ============================================================
# 服务列表（共 6 个容器）：
#   postgres   — PostgreSQL 16 数据库（仅内网）
#   pgbouncer  — 数据库连接池代理（仅内网）
#   redis      — 速率限制计数器（仅内网）
#   api        — Go 后端 API（内网，通过 Nginx 对外）
#   frontend   — Nginx（对外暴露 80 端口）
#   postfix    — 收件 SMTP 服务（对外暴露 25 端口）
#
# ============================================================
# 端口联动速查表
# ============================================================
# 如果要修改某个端口，必须同步修改下方标注的所有位置：
#
# 【修改前端访问端口，默认 80】
#   修改位置：frontend.ports（本文件）
#   仅改左边数字（宿主机端口），右边 80 不动（Nginx 容器内端口固定）
#   无需修改其他文件。
#   例：改为 8888:80 后，访问 http://服务器IP:8888
#
# 【修改 API 内部端口，默认 8080】
#   必须同步修改以下 4 个位置：
#   1. .env → API_PORT=XXXX
#   2. docker-compose.yml → api.ports（本文件，改 "8080:XXXX"）
#   3. nginx/default.conf → 所有 proxy_pass http://api:XXXX 行（共 3 处）
#   4. postfix/entrypoint.sh → sync-domains.sh 脚本中的 http://api:XXXX
#
# 【修改 PgBouncer 端口，默认 6432】
#   必须同步修改以下 2 个位置：
#   1. pgbouncer/pgbouncer.ini → listen_port = XXXX
#   2. .env → API_DB_DSN 中的端口（@pgbouncer:XXXX/）
#
# 【修改 PostgreSQL 端口，默认 5432】
#   必须同步修改以下 1 个位置：
#   1. pgbouncer/pgbouncer.ini → [databases] 第一行的 port=XXXX
#   （此端口仅内网使用，通常不需要修改）
#
# 【修改 SMTP 收件端口，默认 25】
#   必须同步修改以下 2 个位置：
#   1. postfix.ports（本文件）改左边宿主机端口，右边 25 固定
#   2. postfix/main.cf → 如有 smtp_ports 配置需对应修改
#   ⚠️  注意：绝大多数运营商/云服务商默认封锁 25 端口，
#       需在控制台申请解封，或使用 465/587 端口（需修改 master.cf）
#
# 【修改 Redis 端口，默认 6379】
#   必须同步修改以下 1 个位置：
#   1. .env → API_REDIS_ADDR=redis:XXXX
#   （此端口仅内网使用，通常不需要修改）
#
# ============================================================
# 快速部署步骤：
#   1. cp .env.example .env  并填写所有配置
#   2. docker compose up -d
#   3. cat ./data/admin.key  查看管理员 API Key
#   4. 浏览器访问 http://服务器IP 登录
# ============================================================
name: tempmail

services:
  # ==================== PostgreSQL 数据库 ====================
  # 端口 5432 仅在容器内网使用，不对外暴露（由 PgBouncer 代理访问）
  # 凭证来自 .env：POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # 数据持久化目录，重启不丢失数据
      - pgdata:/var/lib/postgresql/data
      # 首次启动时自动执行初始化 SQL（建表 + 创建管理员账号）
      # ⚠️  此文件仅在数据目录为空时执行一次，已有数据不会重新执行
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      # 以下均为性能调优参数，小内存服务器（<2GB）可适当降低：
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"        # 建议设为物理内存的 25%
      - "-c"
      - "effective_cache_size=512MB"  # 建议设为物理内存的 50%
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      # max_connections 必须 >= PgBouncer 的 default_pool_size
      # 如果修改此值，PgBouncer 的 default_pool_size 也要相应调整
      - "max_connections=500"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"        # SSD 存储用 1.1，机械硬盘用 4.0
      - "-c"
      - "effective_io_concurrency=200" # SSD 用 200，机械硬盘用 2
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ==================== PgBouncer（数据库连接池）====================
  # 作用：在 API 和 PostgreSQL 之间做连接复用，支持万级并发而不撑爆 PG 连接数
  # 内部端口：6432（仅内网，API 通过 pgbouncer:6432 访问数据库）
  # ⚠️  如需修改 6432 端口：
  #     同步修改 pgbouncer/pgbouncer.ini → listen_port
  #     同步修改 .env → API_DB_DSN 中的 @pgbouncer:6432
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      # 这两个值用于 entrypoint.sh 生成 userlist.txt（PgBouncer 认证文件）
      # ⚠️  必须与 POSTGRES_USER / POSTGRES_PASSWORD 保持一致
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ==================== Redis（速率限制计数器）====================
  # 内部端口：6379（仅内网，API 通过 redis:6379 访问）
  # 凭证来自 .env：REDIS_PASSWORD（同时设置在 API_REDIS_PASSWORD）
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "128mb"           # Redis 最大内存，超过后按 LRU 淘汰旧 key
      - "--maxmemory-policy"
      - "allkeys-lru"     # 内存满时淘汰策略：最近最少使用
      - "--save"
      - ""                # 关闭 RDB 持久化（速率限制数据不需要持久化）
      - "--tcp-backlog"
      - "511"
      - "--timeout"
      - "300"             # 空闲连接超时（秒）
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ==================== Go API 服务 ====================
  # 宿主机端口映射：8080（宿主）→ 8080（容器）
  # ⚠️  通常不建议直接对外暴露 8080，应通过 Nginx（80 端口）反代访问。
  #     如果不需要直接访问 API（只通过 Nginx），可以删除 ports 这几行。
  #
  # 【修改 API 端口】改左边的 8080 即可（如改为 9090:8080）。
  # 但如果改右边（容器内端口），还必须同步：
  #   - .env → API_PORT=新端口
  #   - nginx/default.conf → 所有 proxy_pass http://api:新端口
  #   - postfix/entrypoint.sh → http://api:新端口/internal/domains
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"  # 左边=宿主机端口，右边=容器内端口（与 .env API_PORT 一致）
    volumes:
      # 管理员 API Key 文件输出目录，启动后执行 cat ./data/admin.key 查看
      - ./data:/data
    environment:
      DB_DSN: ${API_DB_DSN}             # PostgreSQL 连接串（经由 PgBouncer）
      REDIS_ADDR: ${API_REDIS_ADDR}     # Redis 地址（格式：redis:6379）
      REDIS_PASSWORD: ${API_REDIS_PASSWORD}
      RATE_LIMIT: ${API_RATE_LIMIT}     # 速率限制：每窗口最大请求数
      RATE_WINDOW: ${API_RATE_WINDOW}   # 速率限制：时间窗口（秒）
      PORT: ${API_PORT}                 # API 监听端口，需与 ports 右边一致
      SMTP_SERVER_IP: ${SMTP_SERVER_IP} # 服务器公网 IP，用于 MX 验证
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}   # 邮件服务器主机名，用于 MX 记录提示
      ADMIN_KEY_FILE: /data/admin.key   # 管理员 Key 文件路径（容器内路径）
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - internal

  # ==================== 前端 Nginx ====================
  # 宿主机端口映射：80（宿主）→ 80（容器）
  # 功能：
  #   1. 提供静态前端文件（./frontend/）
  #   2. 将 /api/* /public/* /health 请求反向代理到 api:8080
  #
  # 【修改 HTTP 访问端口】只改左边数字：
  #   例如改为 8888:80，则访问 http://服务器IP:8888
  #   不需要修改其他任何文件。
  #
  # 【如果需要 HTTPS（443 端口）】
  #   在此增加 "443:443" 端口映射，并修改 nginx/default.conf 添加 SSL 配置。
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"    # 左边=宿主机端口（用户访问的端口）。右边 80 固定，不要改
      # - "443:443"  # 如需 HTTPS，取消此行注释，并配置 nginx/default.conf 中的 SSL
    volumes:
      # 前端静态文件目录（HTML/CSS/JS，不需要编译，直接挂载）
      - ./frontend:/usr/share/nginx/html:ro
      # Nginx 反代配置（修改 API 端口时需同步修改此文件）
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - internal

  # ==================== Postfix SMTP 收件服务 ====================
  # 宿主机端口映射：25（宿主）→ 25（容器）
  # 作用：接收外部发来的邮件，通过 pipe 调用 mail-receiver.py 投递到 API
  #
  # ⚠️  25 端口特别说明：
  #   - 大多数云服务商（阿里云、腾讯云、AWS 等）默认封锁 25 端口
  #   - 需要在云控制台提交工单申请解封（部分服务商不允许解封）
  #   - 如果无法使用 25 端口，考虑在服务商的安全组/防火墙中开放
  #   - 开放端口命令（以 ufw 为例）：sudo ufw allow 25/tcp
  #
  # 【修改 SMTP 端口】只改左边数字（如 2525:25）。
  #   右边 25 是 Postfix 容器内固定端口，改了需同步修改 postfix/main.cf。
  #   但注意：发件方固定向 25 端口发信，改了端口外部就无法发信。
  postfix:
    build:
      context: .                        # 构建上下文是项目根目录（因为要 COPY postfix/ 目录）
      dockerfile: postfix/Dockerfile
    restart: unless-stopped
    ports:
      - "25:25"    # ⚠️  此端口必须对外开放，外部 MTA 通过此端口发送邮件到本服务
    environment:
      # API 的内部地址，用于 Postfix entrypoint.sh 拉取域名列表
      # ⚠️  如果修改了 API 端口，此处的 http://api:8080 也要同步修改（在 entrypoint.sh 中）
      DB_DSN: ${API_DB_DSN}
    depends_on:
      pgbouncer:
        condition: service_started
    networks:
      - internal

# ──────────────────────────────────────────────────────────────
# 数据卷：PostgreSQL 数据持久化
# ──────────────────────────────────────────────────────────────
volumes:
  pgdata:
    # Docker 管理的具名卷，数据存储在 /var/lib/docker/volumes/tempmail_pgdata/
    # 删除命令：docker volume rm tempmail_pgdata（⚠️  数据不可恢复！）

# ──────────────────────────────────────────────────────────────
# 网络：所有容器共用 internal 桥接网络，互相通过服务名访问
# 例：api 容器用 postgres:5432 / pgbouncer:6432 / redis:6379 访问其他服务
# ──────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
