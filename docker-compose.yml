# ============================================================
# TempMail 临时邮箱平台 - 单容器部署
# Go API + 嵌入前端 + Postfix
# ============================================================
#
# ╔═══════════════════════════════════════════════════════════╗
# ║  端口速查                                                 ║
# ╠════════════╦════════════╦═════════════════════════════════╣
# ║ 80  (对外) ║ app        ║ Web 界面 + API                   ║
# ║ 25  (对外) ║ app        ║ SMTP 收信                        ║
# ╚════════════╩════════════╩═════════════════════════════════╝
#
# ★ 修改端口：只改冒号左边（宿主机端口），右边不要动。
#   例如把 Web 改到 8888：ports: ["8888:8080"]
#
name: tempmail

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
      - "25:25"
    volumes:
      - ./data:/data
    environment:
      DB_DSN: ${API_DB_PATH:-/data/tempmail.db}
      RATE_LIMIT: ${API_RATE_LIMIT:-500}
      RATE_WINDOW: ${API_RATE_WINDOW:-60}
      PORT: "8080"
      SMTP_SERVER_IP: ${SMTP_SERVER_IP}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}
      ADMIN_KEY_FILE: /data/admin.key
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
